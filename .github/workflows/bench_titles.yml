name: ベンチ先タイトル 日次取得

on:
  schedule:
    - cron: "30 21 * * *"   # JST 6:30 毎朝
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: タイトル取得
        run: python tools/fetch_bench_titles.py
      - name: コミット
        run: |
          git config user.name "bench-bot"
          git config user.email "bench-bot@users.noreply.github.com"
          git add data/bench_titles.json
          git diff --cached --quiet || git commit -m "🏷 ベンチ先タイトル自動更新 $(date +%Y%m%d)"
          git push
