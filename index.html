<!doctype html>
<html lang="ja">
<!--
  ベンチマーク・ナビ（Firebase同期版）
  ジャンル選定(STEP1) → 同ジャンルで今伸びてるベンチ先(STEP2) のつながりを記録・可視化。
  Googleログインした本人のデータだけ、PC↔スマホで同期される。
  ▼ あなたがやること：下の firebaseConfig を自分のFirebaseの値に差し替える（手順.md参照）
-->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ベンチマーク・ナビ</title>
<style>
  :root{--ink:#15213e;--ink-soft:#26365c;--paper:#eef1f6;--card:#ffffff;--text:#1b2333;--muted:#6b7585;--line:#dde3ec;--good:#0f8f60;--good-bg:#e3f5ec;--warn:#b67613;--warn-bg:#fbf0d8;--link:#2f63e6;--branch:#bcc8da;--shadow:0 1px 2px rgba(21,33,62,.06),0 6px 18px rgba(21,33,62,.06);}
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;background:var(--paper);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;}
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--paper);position:relative}
  body.wide-hub .app{max-width:1280px}
  body.wide-hub nav{max-width:1280px}
  @media(max-width:780px){body.wide-hub .app,body.wide-hub nav{max-width:760px}}
  .gchartwrap{margin:0}
  .gchartwrap .gcl{font-size:11px;color:var(--ink-soft);margin-bottom:4px;font-weight:700}
  .gchartwrap img{width:100%;height:auto;border:1px solid var(--line);border-radius:10px;cursor:pointer;display:block;background:#0b1220}
  header{position:sticky;top:0;z-index:20;background:var(--ink);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  header .left{display:flex;flex-direction:column}
  header .brand{font-weight:800;letter-spacing:.02em;font-size:15px}
  header .sub{font-size:11px;color:#aebbd6;font-weight:500}
  header .auth{font-size:11.5px;display:flex;align-items:center;gap:8px}
  .pill{background:rgba(255,255,255,.14);color:#fff;border:0;border-radius:999px;padding:7px 12px;font:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .pill.lt{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .pill.pchip.on{border-color:#7a52c4;color:#7a52c4;background:#f6f2fc;font-weight:800}
  .pill:active{transform:translateY(1px)}
  .who{color:#cdd7ec;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  main{flex:1;padding:16px 14px 96px}
  .view-title{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px}
  .view-title h2{font-size:18px;font-weight:800;letter-spacing:-.01em;margin:0}
  .view-title .hint{font-size:11.5px;color:var(--muted);max-width:58%;text-align:right}
  .addbtn{appearance:none;border:0;background:var(--ink);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow)}
  .addbtn:active{transform:translateY(1px)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow)}
  .card.tap{cursor:pointer;transition:border-color .15s}
  .card.tap:hover{border-color:#c3ccdb}
  .row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .name{font-weight:700;font-size:15px;margin:0}
  .url{font-size:12px;color:var(--link);text-decoration:none;word-break:break-all}
  .url:hover{text-decoration:underline}
  .meta{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:9px}
  .meta .m{font-size:12px;color:var(--muted)}
  .meta .m b{display:block;color:var(--text);font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.25}
  .badge{font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .b-good{background:var(--good-bg);color:var(--good)} .b-warn{background:var(--warn-bg);color:var(--warn)}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--ink-soft);background:#e9eef7;border-radius:6px;padding:3px 8px}
  .memo{font-size:12.5px;color:var(--muted);margin-top:8px}
  .empty{text-align:center;padding:40px 18px;color:var(--muted)}
  .empty .big{font-size:15px;color:var(--text);font-weight:700;margin-bottom:6px} .empty .small{font-size:12.5px}
  .sumbar{display:flex;gap:8px;margin-bottom:14px}
  .sumbar .s{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center;box-shadow:var(--shadow)}
  .sumbar .s .n{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .sumbar .s .l{font-size:10.5px;color:var(--muted);margin-top:4px}
  .genreblock{margin-bottom:16px}
  .gnode{background:var(--ink);color:#fff;border-radius:13px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:var(--shadow)}
  .gnode .gn{font-weight:800;font-size:15px} .gnode .gmeta{font-size:11px;color:#b9c5de;margin-top:2px;font-variant-numeric:tabular-nums}
  .gcount{background:rgba(255,255,255,.16);color:#fff;font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .branches{margin:0 0 0 20px;border-left:2px solid var(--branch);padding:6px 0 2px 0}
  .leaf{position:relative;margin:8px 0;padding-left:16px}
  .leaf::before{content:"";position:absolute;left:0;top:18px;width:14px;height:2px;background:var(--branch)}
  .leafcard{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:var(--shadow)}
  .leafcard .ln{font-weight:700;font-size:13.5px} .leafcard .lm{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}
  .noleaf{margin:8px 0 4px 16px;font-size:12px;color:var(--warn);font-weight:600}
  nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);display:flex;max-width:760px;margin:0 auto}
  nav button{flex:1;appearance:none;border:0;background:none;padding:9px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font:inherit}
  nav button .ic{font-size:18px;line-height:1} nav button .lb{font-size:10.5px;font-weight:700}
  nav button.on{color:var(--ink)}
  .scrim{position:fixed;inset:0;background:rgba(21,33,62,.45);z-index:40;display:none;align-items:flex-end;justify-content:center}
  .scrim.show{display:flex}
  .sheet{background:var(--card);width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto}
  @media(min-width:560px){.scrim{align-items:center}.sheet{border-radius:18px;max-height:88vh}}
  .sheet h3{margin:2px 0 14px;font-size:17px;font-weight:800}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px}
  .fld .note{font-weight:500;color:var(--muted);font-size:11px}
  .fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:15px;background:#fbfcfe;color:var(--text)}
  .fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--link);outline-offset:0;border-color:transparent}
  .fld textarea{min-height:58px;resize:vertical}
  .two{display:flex;gap:10px}.two .fld{flex:1}
  .live{font-size:12px;font-weight:700;margin:-4px 0 10px;min-height:16px}
  .acts{display:flex;gap:10px;margin-top:6px}
  .acts button{flex:1;appearance:none;border:0;border-radius:11px;padding:13px;font:inherit;font-weight:800;font-size:14px;cursor:pointer}
  .save{background:var(--ink);color:#fff}.save:active{transform:translateY(1px)}
  .del{background:#fff;color:#c0392b;border:1px solid #f0c9c4;flex:0 0 auto;padding:13px 16px}
  .cancel{background:#eef1f6;color:var(--ink-soft)}
  .loading{text-align:center;padding:50px;color:var(--muted);font-size:13px}
  .gate{text-align:center;padding:60px 24px}
  .gate .big{font-size:18px;font-weight:800;margin-bottom:8px}
  .gate .small{font-size:13px;color:var(--muted);margin-bottom:22px;max-width:360px;margin-left:auto;margin-right:auto}
  .gbtn{appearance:none;border:0;background:var(--ink);color:#fff;font-weight:800;font-size:15px;padding:13px 22px;border-radius:12px;cursor:pointer;box-shadow:var(--shadow)}
  .gbn{background:#eef6ff;border:1px solid #bcd9f5;border-radius:12px;padding:11px 13px;margin:0 2px 14px}
  .gbn .gt{font-size:12px;font-weight:800;color:#1f6fc7;margin-bottom:3px}
  .gbn .gv{font-size:13.5px;color:var(--ink);line-height:1.55}
  .gbn .gv b{color:#c2410c}
  .gbn .gp{font-size:11.5px;color:var(--muted);margin-top:4px}
  .gbn .gs{font-size:11px;color:var(--muted);margin-top:5px}
  .gbn0{background:#fbfcfe;border-color:var(--line);color:var(--muted);font-size:12px;line-height:1.5}
  .grp{font-size:11px;font-weight:800;padding:3px 9px;border-radius:8px;white-space:nowrap}
  .grp-ok{background:#dff5ec;color:#159c73}
  .grp-no{background:#fdeede;color:#c2410c}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="left"><span class="brand">ベンチマーク・ナビ</span><span class="sub">稼げるジャンル → 今伸びてるベンチ先</span></div>
    <div class="auth" id="auth"></div>
  </header>
  <main id="main"><div class="loading">読み込み中…</div></main>
  <nav id="nav">
    <button data-v="step"><span class="ic">🚀</span><span class="lb">ステップ</span></button>
    <button data-v="genre" class="on"><span class="ic">🗂</span><span class="lb">ジャンル＆手本</span></button>
    <button data-v="track"><span class="ic">📈</span><span class="lb">推移</span></button>
    <button data-v="map"><span class="ic">⛓</span><span class="lb">つながり</span></button>
    <button data-v="qa"><span class="ic">❓</span><span class="lb">Q&amp;A</span></button>
  </nav>
</div>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ▼▼▼ ここを自分のFirebaseの値に差し替える（手順.md参照）▼▼▼ */
const firebaseConfig = {
  apiKey: "AIzaSyB-Jk2D7rszFv0DJs-EsheeijZYdFql1fM",
  authDomain: "molten-reach-496513-c6.firebaseapp.com",
  projectId: "molten-reach-496513-c6",
  appId: "1:576477853201:web:c9b7014297ed6e2d3963b0"
};
/* ▲▲▲ ここまで ▲▲▲ */

const configured = !String(firebaseConfig.apiKey).startsWith("PASTE_");
let auth=null, db=null, user=null;
if(configured){ const fapp=initializeApp(firebaseConfig); auth=getAuth(fapp); db=getFirestore(fapp); }

let genres=[], benches=[], qas=[], steps={}, daily={}, goal={}, tracklog={}, kaizen=[], sunodl=[], view="genre";
let trackMetric="subs";
let sunoEditId;
const $main=document.getElementById("main"), $auth=document.getElementById("auth"), $scrim=document.getElementById("scrim"), $sheet=document.getElementById("sheet");
const nowY=new Date().getFullYear();
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const num=v=>{const n=parseFloat(String(v).replace(/,/g,""));return isNaN(n)?null:n;};
const val=id=>{const el=document.getElementById(id);return el?el.value:"";};

function renderAuth(){
  if(!configured){ $auth.innerHTML='<span style="color:#aebbd6">未設定</span>'; return; }
  if(user){ $auth.innerHTML='<span class="who">'+esc(user.email||user.displayName||"ログイン中")+'</span><button class="pill" id="logout">ログアウト</button>';
    document.getElementById("logout").onclick=()=>signOut(auth);
  }else{ $auth.innerHTML='<button class="pill" id="login">ログイン</button>'; document.getElementById("login").onclick=doLogin; }
}
let signingIn=false;
const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
function doLogin(){
  if(signingIn) return; signingIn=true;
  const prov=new GoogleAuthProvider();
  if(isMobile){ signingIn=false; signInWithRedirect(auth,prov).catch(e=>alert("ログインに失敗しました: "+e.message)); return; }
  signInWithPopup(auth,prov).then(()=>{signingIn=false;}).catch(e=>{
    signingIn=false; const c=(e&&e.code)||"";
    if(c==="auth/cancelled-popup-request"||c==="auth/popup-closed-by-user"||c==="auth/user-cancelled") return;
    if(c==="auth/popup-blocked"||c==="auth/operation-not-supported-in-this-environment"||c==="auth/internal-error"){ signInWithRedirect(auth,prov).catch(()=>{}); return; }
    alert("ログインに失敗しました: "+e.message);
  });
}

if(configured){
  getRedirectResult(auth).catch(e=>{ const c=(e&&e.code)||""; if(c&&c!=="auth/no-auth-event") alert("ログインに失敗しました: "+e.message); });
  onAuthStateChanged(auth, async u=>{ user=u; renderAuth();
    if(u){ await loadCloud(); render(); } else { genres=[]; benches=[]; renderGate(); } });
}else{ renderAuth(); renderGate(); }

function userRef(){ return doc(db,"users",user.uid); }
async function loadCloud(){
  try{ const snap=await getDoc(userRef());
    if(snap.exists()){ const d=snap.data(); genres=d.genres||[]; benches=d.benches||[]; qas=d.qas||[]; steps=d.steps||{}; daily=d.daily||{}; goal=d.goal||{}; tracklog=d.tracklog||{}; kaizen=d.kaizen||[]; sunodl=d.sunodl||[]; }
    else { genres=[]; benches=[]; qas=[]; steps={}; daily={}; goal={}; tracklog={}; kaizen=[]; sunodl=[]; await saveCloud(); }
  }catch(e){ console.error(e); alert("データ読込でエラー: "+e.message); genres=[]; benches=[]; qas=[]; steps={}; daily={}; goal={}; tracklog={}; kaizen=[]; sunodl=[]; }
}
async function saveCloud(){ if(!user)return;
  try{ await setDoc(userRef(),{genres,benches,qas,steps,daily,goal,tracklog,kaizen,sunodl,updatedAt:Date.now()},{merge:true}); }
  catch(e){ console.error(e); alert("保存でエラー: "+e.message); }
}

function genreOK(g){const sy=num(g.startYear),mv=num(g.monthly);if(sy==null||mv==null)return null;return (nowY-sy>=2)&&(mv>=100);}
function monthsSince(d){if(!d)return null;const x=new Date(d);if(isNaN(x))return null;const n=new Date();return (n.getFullYear()-x.getFullYear())*12+(n.getMonth()-x.getMonth());}
function benchOK(b){const s=num(b.subs);if(s==null||!b.open)return false;return s>1000;}
function genreName(id){const g=genres.find(x=>x.id===id);return g?g.name:null;}
function goalViews(){ var a=num(goal.amount), r=num(goal.rpm); if(a==null||r==null||r<=0) return null; return Math.round(a/r*1000); }
function viewsLabel(v){ return v>=10000?(v/10000).toFixed(1)+'万回':Math.round(v).toLocaleString()+'回'; }
function goalBannerHTML(){ var v=goalViews(); if(v==null) return '<div class="gbn gbn0">🎯 目標が未設定です。「🚀ステップ → 🎯目標・ペルソナ・ベンチ → 月の目標金額を決める」で設定できます。</div>'; var pd=Math.round(v/30); return '<div class="gbn"><div class="gt">🎯 あなたの目標</div><div class="gv">月収¥'+num(goal.amount).toLocaleString()+' → 目標再生数 <b>'+viewsLabel(v)+'/月</b>（1日 約'+pd.toLocaleString()+'回・RPM¥'+num(goal.rpm).toLocaleString()+'）</div>'+(goal.purpose?'<div class="gp">目的：'+esc(goal.purpose)+'</div>':'')+'<div class="gs">このジャンルでこの再生数を積めるか？を基準に選ぶ</div></div>'; }
function goalOutCalc(a,r){ if(a==null||r==null||r<=0) return null; return Math.round(a/r*1000); }
function goalOutHTML(v){ if(v==null) return '月収目標とRPMを入れると、必要な再生数が出ます'; var pd=Math.round(v/30); return '→ 目標再生数：<b>'+viewsLabel(v)+'/月</b>（1日 約'+pd.toLocaleString()+'回）'; }
function goalReach(g){ var gv=goalViews(); var m=num(g.monthly); if(gv==null||m==null||gv<=0) return null; var mv=m*10000; return {ratio:mv/gv, ok:mv>=gv}; }
function goalReachPill(g){ var r=goalReach(g); if(!r) return ''; var n=r.ratio, t=n>=1?('目標×'+(n>=10?Math.round(n):n.toFixed(1))):'目標未満'; return '<span class="grp '+(r.ok?'grp-ok':'grp-no')+'">🎯'+t+'</span>'; }
function goalFormHTML(){ var a=goal.amount||'', r=goal.rpm||'2000', p=goal.purpose||''; return '<div class="mgoal"><div class="gfh">🎯 あなたの目標（数値で記録）</div><div class="gfr"><label>月収目標</label><div class="gfi"><span>¥</span><input id="g_amount" type="text" inputmode="numeric" value="'+esc(a)+'" placeholder="500000"></div></div><div class="gfr"><label>RPM（1000再生あたり）</label><div class="gfi"><span>¥</span><input id="g_rpm" type="text" inputmode="numeric" value="'+esc(r)+'" placeholder="2000"></div></div><div class="gfr gfp"><label>目的（なぜこの金額？）</label><textarea id="g_purpose" placeholder="この金額を達成したら叶えたい人生（例：会社を辞めて時間と場所に縛られない暮らし）">'+esc(p)+'</textarea></div><div class="gfo" id="g_out">'+goalOutHTML(goalViews())+'</div></div>'; }

function render(){ document.body.classList.toggle("wide-hub",view==="genre"); if(!user&&configured){renderGate();return;} if(view==="genre")renderHub(); else if(view==="bench")renderBench(); else if(view==="track")renderTrack(); else if(view==="kaizen")renderKaizen(); else if(view==="sunodl")renderSunoDL(); else if(view==="material")renderMaterial(); else if(view==="qa")renderQA(); else if(view==="step")renderStep(); else renderMap(); }
function renderMaterial(){
  $main.innerHTML='<div style="padding:4px 2px">'
   +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><button id="matBack" class="pill">← ステップ</button><span style="font-size:16px;font-weight:800;color:var(--ink)">📚 セミナー資料</span><button id="matReload" class="pill" style="margin-left:auto">↻ 再読み込み</button></div>'
   +'<div style="font-size:11.5px;color:var(--muted);margin:0 2px 10px;line-height:1.5">キラさんのセミナー配布スライド（原典Drive）。Driveにアクセス権のあるGoogleアカウントでログイン中だと表示されます。白紙のときは「↻再読み込み」か「Driveで開く」。社外公開しないでください。</div>'
   +'<div style="position:relative;width:100%;aspect-ratio:4/3;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff"><iframe id="matFrame" src="'+SLIDE_EMBED+'" style="position:absolute;inset:0;width:100%;height:100%;border:0" allow="autoplay"></iframe></div>'
   +'<a class="mvid" style="color:#3a6df0;margin-top:10px" href="'+SLIDE_URL+'" target="_blank" rel="noopener">📊 Driveで開く↗（表示されない時はこちら）</a>'
   +'</div>';
  document.getElementById("matBack").onclick=()=>{ view="step"; render(); };
  document.getElementById("matReload").onclick=()=>{ var f=document.getElementById("matFrame"); if(f){ f.src="about:blank"; setTimeout(function(){ f.src=SLIDE_EMBED; },60); } };
}
function renderGate(){
  if(!configured){ $main.innerHTML='<div class="gate"><div class="big">セットアップが必要です</div><div class="small">同梱の「セットアップ手順.md」に沿って、コード冒頭の firebaseConfig にあなたのFirebaseの値を貼ってください。</div></div>'; return; }
  $main.innerHTML='<div class="gate"><div class="big">ログインして始める</div><div class="small">Googleでログインすると、入力データがあなた専用に保存され、PC・スマホで同期されます。</div><button class="gbtn" id="gateLogin">Googleでログイン</button></div>';
  document.getElementById("gateLogin").onclick=doLogin;
}

function renderGenre(){
  let h='<div class="view-title"><h2>稼げるジャンル</h2><button class="addbtn" id="addG">＋ ジャンル</button></div><div style="font-size:12px;color:var(--muted);margin:0 2px 12px">数年安定して伸びている「古くて大きいch」で、そのジャンルが稼げるかを見極める。</div>'+goalBannerHTML();

function imgDownscale(file,maxW,q,cb){ var fr=new FileReader(); fr.onload=function(){ var im=new Image(); im.onload=function(){ var w=im.width,hh=im.height; if(w>maxW){ hh=Math.round(hh*maxW/w); w=maxW; } var c=document.createElement("canvas"); c.width=w; c.height=hh; c.getContext("2d").drawImage(im,0,0,w,hh); try{ cb(c.toDataURL("image/jpeg",q)); }catch(e){ alert("画像の処理に失敗: "+e.message); } }; im.onerror=function(){ alert("画像を読み込めませんでした"); }; im.src=fr.result; }; fr.readAsDataURL(file); }
function editGenre(id){
  const g=id?genres.find(x=>x.id===id):{};
  const f={name:g.name||"",rep:g.rep||"",url:g.url||"",subs:g.subs||"",startYear:g.startYear||"",monthly:g.monthly||"",memo:g.memo||""};
  let gchart=g.chart||"";
  let h='<h3>'+(id?"ジャンルを編集":"ジャンルを追加")+'</h3>'+goalBannerHTML()+fld("ジャンル名","g_name",f.name,"text","例：focus music")+fld("代表チャンネル名","g_rep",f.rep,"text","vidIQで確認した代表例")+fld("代表チャンネルURL","g_url",f.url,"url","https://www.youtube.com/@...")+'<div class="two">'+fld("登録者数（万）","g_subs",f.subs,"number","例：132")+fld("開始年（西暦）","g_year",f.startYear,"number","例：2010")+'</div>'+fld("月間再生数（万）","g_monthly",f.monthly,"number","例：300（=300万）")+'<div class="live" id="g_live"></div>'+fld("結論メモ","g_memo",f.memo,"textarea","このジャンルにするか／気づき")
    +'<div class="fld"><label>📈 vidIQグラフ画像 <span class="note">代表chの「Views gained」波形。ドラッグ＆ドロップ／Cmd+V貼付け／クリックで選択</span></label><div id="g_chart_drop" style="border:2px dashed var(--line);border-radius:10px;padding:16px;text-align:center;cursor:pointer;background:#fbfcfe;color:var(--muted);font-size:12px">'+(gchart?'<img src="'+gchart+'" style="max-width:100%;border-radius:8px;background:#0b1220;display:block;margin:0 auto">':'ここに画像をドラッグ＆ドロップ<br>または Cmd+V で貼り付け<br>（クリックで選択も可）')+'</div><input type="file" id="g_chart_file" accept="image/*" style="display:none"> <button type="button" class="pill" id="g_chart_clear" style="background:#eef0f4;color:#555;margin-top:6px">クリア</button></div>'
    +'<div class="acts">'+(id?'<button class="del" id="g_del">削除</button>':'')+'<button class="cancel" id="g_cancel">閉じる</button><button class="save" id="g_save">保存</button></div>';
  openSheet(h);
  var setChartPrev=function(){ var d=document.getElementById("g_chart_drop"); if(d) d.innerHTML=gchart?'<img src="'+gchart+'" style="max-width:100%;border-radius:8px;background:#0b1220;display:block;margin:0 auto">':'ここに画像をドラッグ＆ドロップ<br>または Cmd+V で貼り付け<br>（クリックで選択も可）'; };
  var takeImg=function(file){ if(file&&file.type&&file.type.indexOf("image")===0){ imgDownscale(file,900,0.78,function(d){ gchart=d; setChartPrev(); }); return true; } return false; };
  var dz=document.getElementById("g_chart_drop"), fi=document.getElementById("g_chart_file");
  dz.onclick=function(){ fi.click(); };
  fi.onchange=function(e){ takeImg(e.target.files&&e.target.files[0]); };
  dz.ondragover=function(e){ e.preventDefault(); dz.style.borderColor="#3a6df0"; };
  dz.ondragleave=function(){ dz.style.borderColor="var(--line)"; };
  dz.ondrop=function(e){ e.preventDefault(); dz.style.borderColor="var(--line)"; takeImg(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]); };
  if(window._gchartPaste) document.removeEventListener("paste",window._gchartPaste);
  window._gchartPaste=function(e){ if(!document.getElementById("g_chart_drop")){ document.removeEventListener("paste",window._gchartPaste); window._gchartPaste=null; return; } var items=e.clipboardData&&e.clipboardData.items; if(!items)return; for(var i=0;i<items.length;i++){ if(items[i].type.indexOf("image")===0){ var f=items[i].getAsFile(); if(f){ e.preventDefault(); takeImg(f); } break; } } };
  document.addEventListener("paste",window._gchartPaste);
  document.getElementById("g_chart_clear").onclick=function(){ gchart=""; setChartPrev(); };
  const liveCalc=()=>{const sy=num(val("g_year")),mv=num(val("g_monthly"));const L=document.getElementById("g_live");if(sy==null||mv==null){L.textContent="";return;}const ok=(nowY-sy>=2)&&(mv>=100);L.innerHTML=ok?'<span style="color:var(--good)">◎ 稼げる（継続'+(nowY-sy)+'年・月間'+mv+'万）</span>':'<span style="color:var(--warn)">要確認（基準：継続2年以上＋月間100万以上）</span>';};
  document.getElementById("g_year").oninput=liveCalc; document.getElementById("g_monthly").oninput=liveCalc; liveCalc();
  document.getElementById("g_save").onclick=async()=>{ const obj={id:id||uid(),name:val("g_name").trim(),rep:val("g_rep").trim(),url:val("g_url").trim(),subs:val("g_subs").trim(),startYear:val("g_year").trim(),monthly:val("g_monthly").trim(),memo:val("g_memo").trim(),chart:gchart};
    if(!obj.name){alert("ジャンル名を入れてください");return;} genres=id?genres.map(x=>x.id===id?obj:x):genres.concat([obj]); await saveCloud(); closeSheet(); render(); };
  if(id)document.getElementById("g_del").onclick=async()=>{ if(!confirm("このジャンルを削除しますか？（紐づくベンチ先は未設定に戻ります）"))return; genres=genres.filter(x=>x.id!==id); benches=benches.map(b=>b.genreId===id?{...b,genreId:""}:b); await saveCloud(); closeSheet(); render(); };
  document.getElementById("g_cancel").onclick=closeSheet;
}

function editBench(id,presetGenre){

    if(!obj.name){alert("チャンネル名を入れてください");return;} benches=id?benches.map(x=>x.id===id?obj:x):benches.concat([obj]); await saveCloud(); closeSheet(); render(); };

  document.getElementById("b_cancel").onclick=closeSheet;
}

  var doneSteps=STEP_DATA.filter(stComplete).length, pct=Math.round(doneSteps/STEP_DATA.length*100);
  var h='<div class="stwrap">';
  h+='<div class="sthd">🚀 キラ式ロードマップ</div>';
  h+='<div class="stsub">BGMで稼ぐ全体の流れを8ステップに。タップで「キラさんの要点・やること」を開けます。各ステップの動画／スライドリンクから本人の説明をその場面で確認できます。</div>';
  h+='<button id="openMaterial" class="pill" style="margin:0 2px 12px;color:#3a6df0;border-color:#cfe0ff">📚 セミナー資料（スライド）を見る</button>';
  h+='<button id="openSuno" class="pill" style="margin:0 2px 12px 6px;color:#7a52c4;border-color:#d9c9f4">🎵 Suno DL 依頼</button>';

  h+='<div class="stbtxt">'+doneSteps+' / '+STEP_DATA.length+' ステップ完了（'+pct+'%）</div>';
  h+=dailyAside();
  h+='<div class="mmbr">';
  STEP_DATA.forEach((s,i)=>{
    var dn=stDoneN(s),cmp=dn===s.ch.length,part=dn>0&&!cmp;
    var open=steps[s.id]&&steps[s.id].open;
    h+='<div class="mnode" data-i="'+i+'">';
    h+='<div class="mhead" data-tog="'+s.id+'"><span class="mdot '+(cmp?'done':(part?'part':''))+'">'+(cmp?'✓':s.ic)+'</span><span class="mtt">'+esc(s.t)+'</span><span class="mcnt '+(cmp?'ok':'')+'">'+dn+'/'+s.ch.length+'</span></div>';
    if(open){
      h+='<div class="mbody">';
      if(s.whyT){ h+='<div class="mwhy"><div class="wh">💡 '+esc(s.whyT)+'</div>'+esc(s.whyK)+'</div>';
        var wv=steps[s.id]&&steps[s.id].why;
        if(wv) h+='<div class="mq"><div class="qh">💬 元の発言（要約前）</div>'+esc(wv).replace(/\n/g,'<br>')+'<div class="ql">🔒 Hiroka専用・このアプリ内だけに表示</div></div>';
        if(s.whyTs!=null) h+='<a class="mvid" href="'+STEP_VID+'&t='+s.whyTs+'s" target="_blank" rel="noopener">▶ 動画で見る（'+stMM(s.whyTs)+'）</a><br>';
      }
      h+='<div class="mk"><b>キラさんの要点</b><br>'+esc(s.k)+'</div>';
      var qv=steps[s.id]&&steps[s.id].quote;
      if(qv) h+='<div class="mq"><div class="qh">💬 キラさんの言葉（全文）</div>'+esc(qv).replace(/\n/g,'<br>')+'<div class="ql">🔒 Hiroka専用・このアプリ内だけに表示</div></div>';
      if(s.ts!=null) h+='<a class="mvid" href="'+STEP_VID+'&t='+s.ts+'s" target="_blank" rel="noopener">▶ 動画で見る（'+stMM(s.ts)+'）</a>　';
      h+='<a class="mvid" style="color:#3a6df0" href="'+SLIDE_URL+'" target="_blank" rel="noopener">📊 スライド↗</a><br>';
      var c=stProg(s.id);
      s.ch.forEach((item,ci)=>{ var on=!!c[ci];
        h+='<label class="mchk" data-chk="'+s.id+'" data-ci="'+ci+'"><input type="checkbox" '+(on?'checked':'')+'><span class="'+(on?'dn':'')+'">'+esc(item)+'</span></label>';
        var src=steps[s.id]&&steps[s.id].chq&&steps[s.id].chq[ci];
        if(src) h+='<div class="msrc"><div class="sh">💬 元の発言（要約前）</div>'+esc(src).replace(/\n/g,'<br>')+'</div>';
        if(s.id==='target'&&ci===0){ h+=goalFormHTML(); }
        else { var av=(steps[s.id]&&steps[s.id].ans&&steps[s.id].ans[ci])||'';
          h+='<div class="manswrap"><div class="al">✍️ あなたの答え・考え</div><textarea class="mans" data-ans="'+s.id+'" data-ai="'+ci+'" placeholder="キラさんの説明をもとに、自分はどう考える？どう実行する？">'+esc(av)+'</textarea></div>'; }
      });
      h+='<div class="mmlbl">📝 メモ</div><textarea class="mmemo" data-memo="'+s.id+'" placeholder="気づき・自分のチャンネルでの結果など">'+esc((steps[s.id]&&steps[s.id].memo)||'')+'</textarea>';
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div></div>';
  $main.innerHTML+=h;
  var om=document.getElementById('openMaterial'); if(om)om.onclick=()=>{ view='material'; render(); };
  var os=document.getElementById('openSuno'); if(os)os.onclick=()=>{ view='sunodl'; render(); };
  var sdm=document.getElementById('sunoDLmini'); if(sdm)sdm.onclick=()=>{ view='sunodl'; render(); };
  // toggle open/close
  $main.querySelectorAll('.mhead').forEach(el=>el.onclick=()=>{ var id=el.getAttribute('data-tog'); steps[id]=steps[id]||{}; steps[id].open=!steps[id].open; renderStep(); });
  // checkbox
  $main.querySelectorAll('.mchk').forEach(el=>{ el.querySelector('input').onclick=async(e)=>{ e.stopPropagation(); var id=el.getAttribute('data-chk'),ci=+el.getAttribute('data-ci'); var sd=STEP_DATA.find(x=>x.id===id); var n=sd?sd.ch.length:0; steps[id]=steps[id]||{}; var prev=steps[id].c, arr=[]; for(var k=0;k<n;k++){ arr[k]=!!(prev&&prev[k]); } arr[ci]=e.target.checked; steps[id].c=arr; steps[id].open=true; await saveCloud(); renderStep(); }; });
  // memo (save on blur)
  $main.querySelectorAll('.mmemo').forEach(el=>{ el.onblur=async()=>{ var id=el.getAttribute('data-memo'); steps[id]=steps[id]||{}; if((steps[id].memo||'')===el.value)return; steps[id].memo=el.value; steps[id].open=true; await saveCloud(); }; });
  $main.querySelectorAll('.st-aside .sachk').forEach(el=>{ el.querySelector('input').onclick=(e)=>{ e.stopPropagation(); dailyToggle(+el.getAttribute('data-di'), e.target.checked); }; });
  $main.querySelectorAll('.mans').forEach(el=>{ el.onblur=async()=>{ var id=el.getAttribute('data-ans'), ai=+el.getAttribute('data-ai'); var sd=STEP_DATA.find(x=>x.id===id); var n=sd?sd.ch.length:0; steps[id]=steps[id]||{}; var prev=steps[id].ans, arr=[]; for(var k=0;k<n;k++){ arr[k]=(prev&&prev[k])||''; } if(arr[ai]===el.value)return; arr[ai]=el.value; steps[id].open=true; steps[id].ans=arr; await saveCloud(); }; });
  var ga=document.getElementById('g_amount'), gr=document.getElementById('g_rpm'), gp=document.getElementById('g_purpose');
  if(ga&&gr&&gp){ var grecalc=function(){ var o=document.getElementById('g_out'); if(o) o.innerHTML=goalOutHTML(goalOutCalc(num(ga.value),num(gr.value))); };
    var gsave=async function(){ if((goal.amount||'')===ga.value.trim()&&(goal.rpm||'')===gr.value.trim()&&(goal.purpose||'')===gp.value)return; goal.amount=ga.value.trim(); goal.rpm=gr.value.trim(); goal.purpose=gp.value; if(steps.target)steps.target.open=true; await saveCloud(); };
    ga.oninput=grecalc; gr.oninput=grecalc; ga.onblur=gsave; gr.onblur=gsave; gp.onblur=gsave; }
}

window.__importStepQuotes=async(map)=>{ if(!user)return"need login"; for(const k in map){ steps[k]=steps[k]||{}; steps[k].quote=map[k]; } await saveCloud(); window.__SQ="ok:"+Object.keys(map).length; if(view==="step")renderStep(); return window.__SQ; };
window.__resetDaily=async()=>{ if(!user)return"need login"; daily={}; await saveCloud(); if(view==="step")renderStep(); window.__RD="reset"; return"reset"; };
window.__importStepChq=async(map)=>{ if(!user)return"need login"; for(const k in map){ steps[k]=steps[k]||{}; steps[k].chq=map[k]; } await saveCloud(); window.__SC="ok:"+Object.keys(map).length; if(view==="step")renderStep(); return window.__SC; };
window.__setStep=async(id,obj)=>{ if(!user)return"need login"; steps[id]=Object.assign(steps[id]||{},obj); await saveCloud(); window.__SS="ok"; if(view==="step")renderStep(); return"ok"; };
window.__importQAS=async(arr)=>{ if(!user)return"need login"; arr.forEach(n=>{ var i=qas.findIndex(x=>x.sourceTime===n.sourceTime&&x.asker===n.asker); if(i>=0) qas[i]=Object.assign({},qas[i],n); else qas.push(Object.assign({id:uid(),checked:false},n)); }); await saveCloud(); window.__IQ="ok:"+arr.length+" total:"+qas.length; if(view==="qa")renderQA(); return window.__IQ; };
$scrim.onclick=e=>{if(e.target===$scrim)closeSheet();};
document.querySelectorAll("#nav button").forEach(btn=>btn.onclick=()=>{ view=btn.getAttribute("data-v"); document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("on",b===btn)); render(); });
